<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تطبيق المراسلة عبر البلوتوث | Bluetooth Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .connection-status {
            font-size: 0.85rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .status-dot.connected {
            background: #4caf50;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Control Buttons */
        .controls {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Devices List */
        .devices-list {
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .device-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .device-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .device-name {
            font-weight: bold;
            color: #333;
        }

        .device-id {
            font-size: 0.75rem;
            color: #666;
            margin-top: 3px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-info {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2rem;
            padding: 0;
        }

        /* Info Panel */
        .info-panel {
            background: #f8f9fa;
            padding: 10px;
            font-size: 0.75rem;
            text-align: center;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>💬 مراسلة البلوتوث</h1>
            <div class="connection-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">غير متصل</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="scanBtn" onclick="scanForDevices()">🔍 بحث عن أجهزة</button>
            <button class="btn-secondary" id="disconnectBtn" onclick="disconnect()" disabled>❌ قطع الاتصال</button>
        </div>

        <div id="devicesContainer" class="devices-list" style="display: none;">
            <h3 style="margin-bottom: 10px; font-size: 0.9rem;">📱 الأجهزة المتاحة:</h3>
            <div id="devicesList"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div style="text-align: center; color: #999; padding: 20px;">
                👈 اضغط "بحث عن أجهزة" للبدء
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." disabled>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>📤</button>
        </div>

        <div class="info-panel">
            ℹ️ تأكد من تشغيل البلوتوث ومنح صلاحيات الموقع
        </div>
    </div>

    <script>
        let device = null;
        let server = null;
        let service = null;
        let characteristic = null;
        let isConnected = false;

        // UUIDs الخاصة بخدمة المراسلة (معرفات فريدة)
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        // تحديث واجهة المستخدم
        function updateUI() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const scanBtn = document.getElementById('scanBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');

            if (isConnected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'متصل ✓';
                scanBtn.disabled = true;
                disconnectBtn.disabled = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                document.getElementById('devicesContainer').style.display = 'none';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'غير متصل';
                scanBtn.disabled = false;
                disconnectBtn.disabled = true;
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        // إضافة رسالة إلى شاشة المحادثة
        function addMessage(text, type) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div>${escapeHtml(text)}</div>
                <div class="message-info">${type === 'sent' ? 'أنت' : 'الطرف الآخر'} • ${time}</div>
            `;
            
            // إزالة الرسالة الترحيبية إذا كانت موجودة
            if (chatArea.children.length === 1 && chatArea.children[0].style?.textAlign === 'center') {
                chatArea.innerHTML = '';
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // منع هجمات XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // البحث عن أجهزة البلوتوث
        async function scanForDevices() {
            try {
                if (!navigator.bluetooth) {
                    alert('❌ متصفحك لا يدعم تقنية Web Bluetooth. يرجى استخدام Chrome أو Edge على Android/Desktop.');
                    return;
                }

                addSystemMessage('🔍 جاري البحث عن الأجهزة...');
                
                const deviceList = document.getElementById('devicesList');
                deviceList.innerHTML = '<div style="text-align: center; padding: 20px;">🔍 جاري البحث...</div>';
                document.getElementById('devicesContainer').style.display = 'block';

                const options = {
                    filters: [{ services: [SERVICE_UUID] }],
                    optionalServices: [SERVICE_UUID],
                    acceptAllDevices: false
                };

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }],
                    optionalServices: [SERVICE_UUID]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);
                
                addSystemMessage(`📱 تم اختيار الجهاز: ${device.name || 'غير معروف'}`);
                await connectToDevice();
                
            } catch (error) {
                console.error('خطأ في البحث:', error);
                if (error.name === 'NotFoundError') {
                    addSystemMessage('❌ لم يتم العثور على أجهزة. تأكد من تشغيل البلوتوث على الجهاز الآخر');
                } else if (error.name === 'SecurityError') {
                    addSystemMessage('❌ يرجى منح صلاحيات الموقع والبلوتوث');
                } else {
                    addSystemMessage(`❌ خطأ: ${error.message}`);
                }
                document.getElementById('devicesContainer').style.display = 'none';
            }
        }

        // الاتصال بالجهاز المختار
        async function connectToDevice() {
            try {
                addSystemMessage('🔄 جاري الاتصال بالجهاز...');
                
                server = await device.gatt.connect();
                addSystemMessage('✅ تم الاتصال بنجاح!');
                
                service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                // الاستماع للرسائل الواردة
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleReceivedMessage);
                
                isConnected = true;
                updateUI();
                addSystemMessage('💬 جاهز للمراسلة!');
                
            } catch (error) {
                console.error('خطأ في الاتصال:', error);
                addSystemMessage(`❌ فشل الاتصال: ${error.message}`);
                isConnected = false;
                updateUI();
            }
        }

        // معالجة الرسائل المستلمة
        function handleReceivedMessage(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const message = decoder.decode(value);
            
            if (message && message.trim()) {
                addMessage(message, 'received');
                // اهتزاز خفيف للجهاز (إذا كانت الميزة مدعومة)
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
            }
        }

        // إرسال رسالة
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) {
                alert('الرجاء كتابة رسالة');
                return;
            }
            
            if (!isConnected || !characteristic) {
                alert('غير متصل بأي جهاز');
                return;
            }
            
            try {
                const encoder = new TextEncoder('utf-8');
                const data = encoder.encode(message);
                await characteristic.writeValue(data);
                
                addMessage(message, 'sent');
                input.value = '';
                input.focus();
                
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                alert(`فشل إرسال الرسالة: ${error.message}`);
            }
        }

        // قطع الاتصال
        async function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            onDisconnected();
        }

        // معالجة قطع الاتصال
        function onDisconnected() {
            isConnected = false;
            device = null;
            server = null;
            service = null;
            characteristic = null;
            updateUI();
            addSystemMessage('🔌 تم قطع الاتصال');
            document.getElementById('devicesContainer').style.display = 'none';
        }

        // إضافة رسالة نظام
        function addSystemMessage(text) {
            const chatArea = document.getElementById('chatArea');
            const systemDiv = document.createElement('div');
            systemDiv.style.cssText = `
                text-align: center;
                font-size: 0.75rem;
                color: #999;
                padding: 5px;
                margin: 5px 0;
            `;
            systemDiv.textContent = text;
            
            if (chatArea.children.length === 1 && chatArea.children[0].style?.textAlign === 'center') {
                chatArea.innerHTML = '';
            }
            
            chatArea.appendChild(systemDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // إرسال بالضغط على Enter
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // التحقق من دعم المتصفح عند التحميل
        window.addEventListener('load', () => {
            if (!navigator.bluetooth) {
                addSystemMessage('⚠️ متصفحك لا يدعم Web Bluetooth. استخدم Chrome 86+ أو Edge 86+ على Android/Desktop');
            } else {
                addSystemMessage('✅ التطبيق جاهز! اضغط "بحث عن أجهزة" للبدء');
            }
        });
    </script>
</body>
</html>
