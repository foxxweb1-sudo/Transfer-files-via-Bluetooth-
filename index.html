<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير ملفات البلوتوث - النسخة الحقيقية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .file-card:hover { transform: translateY(-3px); transition: all 0.2s ease; }
        .active-tab { border-bottom: 3px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fab fa-bluetooth-b text-2xl"></i>
                مدير الملفات الذكي
            </h1>
            <div class="flex gap-2">
                <button id="btnPair" class="bg-white text-blue-600 px-4 py-2 rounded-full text-sm font-bold hover:bg-blue-50 transition">
                    <i class="fas fa-link"></i> اقتران بلوتوث
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <!-- Dashboard / Status -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="glass-morphism p-4 rounded-2xl flex items-center gap-4 border-r-4 border-blue-500">
                <div class="bg-blue-100 p-3 rounded-full text-blue-600"><i class="fas fa-bluetooth text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">حالة الاتصال</p>
                    <p id="btStatus" class="font-bold text-gray-800">غير متصل</p>
                </div>
            </div>
            <div class="glass-morphism p-4 rounded-2xl flex items-center gap-4 border-r-4 border-green-500">
                <div class="bg-green-100 p-3 rounded-full text-green-600"><i class="fas fa-folder-open text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">الملفات المكتشفة</p>
                    <p id="fileCount" class="font-bold text-gray-800">0 ملف</p>
                </div>
            </div>
            <div class="glass-morphism p-4 rounded-2xl flex items-center gap-4 border-r-4 border-purple-500">
                <label class="cursor-pointer flex items-center gap-4 w-full">
                    <input type="file" id="realFileInput" multiple class="hidden" accept="image/*,video/*,audio/*">
                    <div class="bg-purple-100 p-3 rounded-full text-purple-600"><i class="fas fa-plus text-xl"></i></div>
                    <div>
                        <p class="text-xs text-gray-500">إضافة ملفات</p>
                        <p class="font-bold text-gray-800">اختر من جهازك</p>
                    </div>
                </label>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex bg-white rounded-xl shadow-sm mb-6 overflow-hidden">
            <button onclick="changeTab('image')" id="tab-image" class="flex-1 py-4 font-bold active-tab transition text-sm">
                <i class="fas fa-images ml-1"></i> الصور
            </button>
            <button onclick="changeTab('video')" id="tab-video" class="flex-1 py-4 font-bold text-gray-400 transition text-sm">
                <i class="fas fa-video ml-1"></i> الفيديو
            </button>
            <button onclick="changeTab('audio')" id="tab-audio" class="flex-1 py-4 font-bold text-gray-400 transition text-sm">
                <i class="fas fa-music ml-1"></i> الموسيقى
            </button>
        </div>

        <!-- File Display Area -->
        <div id="fileGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- الملفات ستظهر هنا -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20">
            <i class="fas fa-cloud-upload-alt text-6xl text-gray-200 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-400">لا توجد ملفات حالياً</h3>
            <p class="text-gray-400 text-sm">قم برفع ملفات أو الاتصال بجهاز عبر البلوتوث</p>
        </div>
    </main>

    <!-- Global Loader -->
    <div id="loader" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
            <p id="loaderMsg" class="font-bold text-gray-700">جاري الاتصال...</p>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all pointer-events-none z-[200]"></div>

    <script>
        let allFiles = []; // مصفوفة لتخزين الملفات الحقيقية المرفوعة
        let currentFilter = 'image';

        const realFileInput = document.getElementById('realFileInput');
        const fileGrid = document.getElementById('fileGrid');
        const emptyState = document.getElementById('emptyState');
        const btStatus = document.getElementById('btStatus');
        const fileCountDisplay = document.getElementById('fileCount');

        // 1. معالجة اختيار الملفات الحقيقية من الجهاز
        realFileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                showLoader("جاري استيراد الملفات...");
                setTimeout(() => {
                    files.forEach(file => {
                        const fileData = {
                            id: Date.now() + Math.random(),
                            name: file.name,
                            size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                            type: file.type.split('/')[0], // image, video, or audio
                            url: URL.createObjectURL(file), // رابط حقيقي للملف
                            rawFile: file
                        };
                        allFiles.push(fileData);
                    });
                    renderFiles();
                    hideLoader();
                    showToast(`تمت إضافة ${files.length} ملف بنجاح`);
                }, 1000);
            }
        });

        // 2. تصفية الملفات حسب النوع
        function changeTab(type) {
            currentFilter = type;
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-400');
            });
            document.getElementById('tab-' + type).classList.add('active-tab');
            document.getElementById('tab-' + type).classList.remove('text-gray-400');
            renderFiles();
        }

        // 3. عرض الملفات في الشبكة
        function renderFiles() {
            const filtered = allFiles.filter(f => f.type === currentFilter);
            fileGrid.innerHTML = '';
            fileCountDisplay.innerText = `${allFiles.length} ملف`;

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(file => {
                    const card = document.createElement('div');
                    card.className = "file-card bg-white p-3 rounded-2xl shadow-sm relative group overflow-hidden border border-gray-100";
                    
                    let preview = '';
                    if (file.type === 'image') {
                        preview = `<img src="${file.url}" class="w-full h-24 object-cover rounded-lg">`;
                    } else if (file.type === 'video') {
                        preview = `<div class="w-full h-24 bg-red-100 text-red-600 rounded-lg flex items-center justify-center"><i class="fas fa-video text-2xl"></i></div>`;
                    } else {
                        preview = `<div class="w-full h-24 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-music text-2xl"></i></div>`;
                    }

                    card.innerHTML = `
                        ${preview}
                        <div class="mt-2">
                            <p class="text-xs font-bold text-gray-800 truncate" title="${file.name}">${file.name}</p>
                            <p class="text-[10px] text-gray-400">${file.size}</p>
                        </div>
                        <div class="absolute inset-0 bg-blue-600/90 flex flex-col items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="downloadFile('${file.url}', '${file.name}')" class="bg-white text-blue-600 p-2 rounded-full hover:scale-110 transition">
                                <i class="fas fa-download"></i>
                            </button>
                            <span class="text-white text-[10px] font-bold">تحميل</span>
                        </div>
                    `;
                    fileGrid.appendChild(card);
                });
            }
        }

        // 4. وظيفة التحميل الحقيقية
        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast("بدء تحميل: " + filename);
        }

        // 5. محاولة الاتصال بالبلوتوث الحقيقي
        document.getElementById('btnPair').addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                showToast("عذراً، متصفحك لا يدعم Bluetooth API");
                return;
            }

            try {
                showLoader("جاري البحث عن أجهزة بلوتوث...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });
                
                btStatus.innerText = "متصل بـ " + (device.name || "جهاز غير معروف");
                btStatus.className = "font-bold text-green-600";
                hideLoader();
                showToast("تم الاقتران بنجاح!");
            } catch (error) {
                hideLoader();
                if (error.name === 'NotFoundError') {
                    showToast("تم إلغاء عملية البحث");
                } else {
                    showToast("خطأ في الاتصال: " + error.message);
                }
            }
        });

        // Utilities
        function showLoader(msg) {
            document.getElementById('loaderMsg').innerText = msg;
            loader.classList.remove('hidden');
        }
        function hideLoader() { loader.classList.add('hidden'); }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            t.style.bottom = '30px';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.bottom = '10px';
            }, 3000);
        }
    </script>
</body>
</html>
